<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Crosswordle app icon: two crossing tile-words on warm paper -->
  <rect width="1024" height="1024" rx="232" fill="#2e9e8f"/>
  <rect x="64" y="64" width="896" height="896" rx="184" fill="#f7f4ee"/>
  <!-- across word: C R O S S -->
  <g font-family="Helvetica, Arial, sans-serif" font-weight="800" text-anchor="middle">
    <rect x="142" y="332" width="150" height="150" rx="28" fill="#2e9e8f"/>
    <rect x="306" y="332" width="150" height="150" rx="28" fill="#2e9e8f"/>
    <rect x="470" y="332" width="150" height="150" rx="28" fill="#e3a84e"/>
    <rect x="634" y="332" width="150" height="150" rx="28" fill="#2e9e8f"/>
    <!-- down word crossing at the amber tile -->
    <rect x="470" y="168" width="150" height="150" rx="28" fill="#2e9e8f"/>
    <rect x="470" y="496" width="150" height="150" rx="28" fill="#2e9e8f"/>
    <rect x="470" y="660" width="150" height="150" rx="28" fill="#2e9e8f"/>
    <text x="217" y="444" font-size="108" fill="#ffffff">C</text>
    <text x="381" y="444" font-size="108" fill="#ffffff">R</text>
    <text x="545" y="444" font-size="108" fill="#ffffff">O</text>
    <text x="709" y="444" font-size="108" fill="#ffffff">S</text>
    <text x="545" y="280" font-size="108" fill="#ffffff">W</text>
    <text x="545" y="608" font-size="108" fill="#ffffff">R</text>
    <text x="545" y="772" font-size="108" fill="#ffffff">D</text>
  </g>
</svg>
